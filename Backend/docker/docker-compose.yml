services:

  # Express API
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api

    container_name: myguestly_api

    restart: unless-stopped

    env_file: 
      - ../.env

    ports:
      - "5003:5003"
    volumes:
      - ../:/app
      - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myguestly_network

# Prisma Studio
  prisma-studio:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: myguestly_prisma_studio
    command: npx prisma studio --hostname 0.0.0.0 --port 5555
    env_file:
      - ../.env
    ports:
      - "5555:5555"
    depends_on:
      - postgres
    networks:
      - myguestly_network

