services:

  # =========================
  # API SERVICE
  # =========================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api

    container_name: myguestly_api

    restart: unless-stopped

    env_file:
      - ../.env

    ports:
      - "5003:5003"

    volumes:
      - ../:/app
      - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    command: >
      sh -c "
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run dev
      "

    networks:
      - myguestly_network


  # =========================
  # PRISMA STUDIO
  # =========================
  prisma-studio:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api

    container_name: myguestly_prisma_studio

    command: npx prisma studio --browser none --port 5555

    env_file:
      - ../.env

    ports:
      - "5555:5555"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - myguestly_network


  # =========================
  # POSTGRES
  # =========================
  postgres:
    image: postgres:16-alpine

    container_name: myguestly_postgres

    restart: unless-stopped

    env_file:
      - ../.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myguestly_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - myguestly_network


  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7-alpine

    container_name: myguestly_redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

    networks:
      - myguestly_network


  # =========================
  # NGINX
  # =========================
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile

    container_name: myguestly_nginx

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - api

    networks:
      - myguestly_network


networks:
  myguestly_network:
    driver: bridge


volumes:
  postgres_data:
  redis_data: