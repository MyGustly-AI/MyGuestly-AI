  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: myguestly_postgres

    env_file:
      - ../.env
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - myguestly_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myguestly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: myguestly_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myguestly_network

  #Nginx
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: myguestly_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - myguestly_network

networks:
  myguestly_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
