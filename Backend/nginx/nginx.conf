events {
    worker_connections 1024;
}

http {

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=qr_limit:10m      rate=20r/m;
    limit_req_zone $binary_remote_addr zone=invite_limit:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=global_limit:10m  rate=30r/s;

    # Upstream API
    upstream myguestly_api {
        server api:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ─── Security headers ───────────────────────────
        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         DENY;
        add_header X-XSS-Protection        "1; mode=block";
        add_header Referrer-Policy         "strict-origin-when-cross-origin";

        # ─── Health check (bypass rate limiting) ────────
        location = /health {
            proxy_pass         http://myguestly_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ─── WebSocket (Socket.io) ───────────────────────
        location /socket.io/ {
            proxy_pass             http://myguestly_api;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       X-Real-IP  $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout     86400s;
        }

        # ─── Auth login (5 req/min) ──────────────────────
        location = /api/v1/auth/login {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass         http://myguestly_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── QR scan (20 req/min) ───────────────────────
        location = /api/v1/qr/scan {
            limit_req zone=qr_limit burst=5 nodelay;
            proxy_pass         http://myguestly_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Invite send (10 req/min) ───────────────────
        location = /api/v1/invite/send {
            limit_req zone=invite_limit burst=5 nodelay;
            proxy_pass         http://myguestly_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── All other routes (30 req/s) ────────────────
        location / {
            limit_req zone=global_limit burst=20 nodelay;

            proxy_pass         http://myguestly_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}